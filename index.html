<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請求書作成（アーティスト向け）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans','Yu Gothic',Meiryo,sans-serif; background: #f3f4f6; }
  input:focus, textarea:focus, select:focus { border-color: #374151 !important; outline: none; }
  input[type=number] { text-align: right; }
  @media print {
    .no-print { display: none !important; }
    body { background: #fff; }
    @page { margin: 15mm; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const uid = () => Math.random().toString(36).slice(2, 8);
const blankItem = () => ({ id: uid(), name: "", qty: 1, unit: "回", price: "", withholding: false });
const fmt = n => Number(n || 0).toLocaleString("ja-JP");
const WITHHOLDING_RATE = 0.1021;

const s = {
  page: { fontFamily: "'Hiragino Sans','Yu Gothic',Meiryo,sans-serif", background: "#f3f4f6", minHeight: "100vh", padding: 24 },
  card: { background: "#fff", border: "1px solid #d1d5db", borderRadius: 4, padding: 20, marginBottom: 14 },
  title: { fontSize: 11, fontWeight: 700, color: "#374151", borderBottom: "2px solid #1f2937", paddingBottom: 5, marginBottom: 14, textTransform: "uppercase", letterSpacing: 1 },
  label: { display: "block", fontSize: 11, fontWeight: 600, color: "#6b7280", marginBottom: 3 },
  inp: { width: "100%", padding: "7px 9px", border: "1px solid #d1d5db", borderRadius: 3, fontSize: 13, boxSizing: "border-box" },
  grid2: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 },
  grid3: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 },
};

function F({ label, children }) {
  return <div><span style={s.label}>{label}</span>{children}</div>;
}

function Hanko({ realName }) {
  if (!realName) return null;
  const sei = realName.replace(/　| /g, " ").split(" ")[0] || realName;
  const chars = [...sei];
  const size = chars.length <= 2 ? 52 : 56;
  const cx = size / 2, cy = size / 2, r = size / 2 - 3;
  const fontSize = chars.length === 1 ? 22 : chars.length === 2 ? 18 : chars.length === 3 ? 13 : 11;
  const lineH = fontSize + 2;
  const totalH = chars.length * lineH;
  const startY = cy - totalH / 2 + lineH / 2 + 1;
  return (
    <svg width={size} height={size} style={{ display: "inline-block", verticalAlign: "middle" }}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#c0392b" strokeWidth="2" />
      <circle cx={cx} cy={cy} r={r - 3} fill="none" stroke="#c0392b" strokeWidth="0.8" opacity="0.4" />
      {chars.map((ch, i) => (
        <text key={i} x={cx} y={startY + i * lineH} textAnchor="middle" dominantBaseline="middle"
          fontSize={fontSize} fontWeight="bold" fill="#c0392b"
          fontFamily="'Hiragino Mincho Pro','Yu Mincho',serif">{ch}</text>
      ))}
    </svg>
  );
}

function App() {
  const today = new Date().toISOString().slice(0, 10);
  const due = new Date(Date.now() + 9 * 86400000).toISOString().slice(0, 10);

  const [f, setF] = useState({
    invoiceNo: "", date: today, dueDate: due,
    realName: "", artistName: "", addr: "", tel: "",
    toName: "合同会社03", subject: "",
    bankName: "", branchName: "", branchCode: "", accountType: "普通", accountNo: "", accountHolder: "",
    notes: "",
  });
  const [items, setItems] = useState([
    { id: uid(), name: "", qty: 1, unit: "回", price: "", withholding: true },
    { id: uid(), name: "交通費往復", qty: 1, unit: "人", price: "", withholding: false },
  ]);
  const [preview, setPreview] = useState(false);

  const upd = (k, v) => setF(p => ({ ...p, [k]: v }));
  const updItem = (id, k, v) => setItems(p => p.map(i => i.id === id ? { ...i, [k]: v } : i));
  const addItem = () => setItems(p => [...p, blankItem()]);
  const delItem = (id) => setItems(p => p.filter(i => i.id !== id));

  const subtotal = items.reduce((s, i) => s + (Number(i.price) || 0) * (Number(i.qty) || 0), 0);
  const withholdingBase = items.filter(i => i.withholding).reduce((s, i) => s + (Number(i.price) || 0) * (Number(i.qty) || 0), 0);
  const withholdingTax = Math.floor(withholdingBase * WITHHOLDING_RATE);
  const total = subtotal - withholdingTax;

  const inp = (val, onChange, ph = "", type = "text", extra = {}) => (
    <input style={s.inp} type={type} value={val} onChange={e => onChange(e.target.value)} placeholder={ph} {...extra} />
  );

  function handlePrint() { setPreview(true); setTimeout(() => window.print(), 300); }

  const tdL = { padding: "5px 8px", borderBottom: "1px solid #e5e7eb" };
  const tdR = { padding: "5px 8px", borderBottom: "1px solid #e5e7eb", textAlign: "right" };

  if (preview) return (
    <div style={{ fontFamily: "'Hiragino Sans','Yu Gothic',Meiryo,sans-serif", maxWidth: 720, margin: "0 auto", padding: "32px 40px", background: "#fff", fontSize: 12, color: "#111" }}>
      <div className="no-print" style={{ marginBottom: 16, display: "flex", gap: 8 }}>
        <button onClick={() => setPreview(false)} style={{ border: "1px solid #d1d5db", borderRadius: 3, padding: "6px 14px", cursor: "pointer", fontSize: 12 }}>← 編集に戻る</button>
        <button onClick={() => window.print()} style={{ background: "#1f2937", color: "#fff", border: "none", borderRadius: 3, padding: "6px 14px", cursor: "pointer", fontSize: 12 }}>🖨 印刷 / PDF保存</button>
      </div>

      <h1 style={{ textAlign: "center", fontSize: 22, fontWeight: 900, letterSpacing: 10, borderBottom: "2px solid #111", paddingBottom: 10, marginBottom: 20 }}>請　求　書</h1>

      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, borderBottom: "1px solid #111", paddingBottom: 3, marginBottom: 6 }}>{f.toName} 御中</div>
          <div style={{ marginBottom: 12 }}>下記の通りご請求申し上げます。</div>
          <table style={{ fontSize: 12, borderCollapse: "collapse" }}>
            <tbody>
              <tr><td style={{ paddingRight: 12, color: "#555", fontWeight: 600 }}>件名</td><td>{f.subject}</td></tr>
              <tr><td style={{ paddingRight: 12, color: "#555", fontWeight: 600 }}>支払い期限</td><td>{f.dueDate}</td></tr>
            </tbody>
          </table>
        </div>
        <div style={{ textAlign: "right", lineHeight: 1.9 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 8 }}>
            <div style={{ fontWeight: 700 }}>{f.realName}{f.artistName ? `（${f.artistName}）` : ""}</div>
            <Hanko realName={f.realName} />
            <span style={{ fontSize: 11, color: "#888" }}>(印)</span>
          </div>
          {f.addr && <div style={{ color: "#555" }}>{f.addr}</div>}
          {f.tel && <div>{f.tel}</div>}
          <div style={{ marginTop: 6, color: "#555" }}>発行日　{f.date}</div>
          {f.invoiceNo && <div style={{ color: "#555" }}>No. {f.invoiceNo}</div>}
        </div>
      </div>

      <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 12, border: "1px solid #d1d5db" }}>
        <tbody>
          <tr style={{ background: "#f3f4f6" }}>
            <td style={{ padding: "10px 16px", fontWeight: 700, fontSize: 14, border: "1px solid #d1d5db", width: 80 }}>合計</td>
            <td style={{ padding: "10px 16px", fontWeight: 900, fontSize: 22, border: "1px solid #d1d5db" }}>{fmt(total)} <span style={{ fontSize: 14 }}>円</span></td>
            <td style={{ border: "1px solid #d1d5db" }}></td><td style={{ border: "1px solid #d1d5db" }}></td>
          </tr>
          <tr style={{ background: "#1f2937", color: "#fff" }}>
            {["摘要", "数量", "単位", "単価", "金額"].map((h, i) => (
              <th key={h} style={{ padding: "6px 8px", textAlign: i > 0 ? "right" : "left", fontWeight: 600, border: "1px solid #374151" }}>{h}</th>
            ))}
          </tr>
          {items.filter(i => i.name || i.price).map((item, idx) => {
            const amt = (Number(item.price) || 0) * (Number(item.qty) || 0);
            return (
              <tr key={item.id} style={{ background: idx % 2 === 0 ? "#f9fafb" : "#fff" }}>
                <td style={tdL}>{item.name}{item.withholding ? <span style={{ color: "#6b7280", fontSize: 10 }}> ※源泉対象</span> : ""}</td>
                <td style={tdR}>{item.qty}</td>
                <td style={tdR}>{item.unit}</td>
                <td style={tdR}>{fmt(item.price)}</td>
                <td style={tdR}>{fmt(amt)}</td>
              </tr>
            );
          })}
          {Array(Math.max(0, 8 - items.filter(i => i.name || i.price).length)).fill(0).map((_, i) => (
            <tr key={"e" + i} style={{ background: i % 2 === 0 ? "#f9fafb" : "#fff" }}>
              {[...Array(5)].map((__, j) => <td key={j} style={{ ...tdL, height: 24 }}></td>)}
            </tr>
          ))}
          <tr><td colSpan={4} style={{ ...tdR, fontWeight: 600, background: "#f3f4f6" }}>小計</td><td style={{ ...tdR, fontWeight: 600, background: "#f3f4f6" }}>{fmt(subtotal)}</td></tr>
          <tr><td colSpan={4} style={{ ...tdR, color: "#555", background: "#f3f4f6" }}>源泉徴収 天引き</td><td style={{ ...tdR, background: "#f3f4f6" }}>{fmt(withholdingTax)}</td></tr>
          <tr style={{ borderTop: "2px solid #1f2937" }}>
            <td colSpan={4} style={{ ...tdR, fontWeight: 800, fontSize: 14 }}>合計</td>
            <td style={{ ...tdR, fontWeight: 800, fontSize: 14 }}>{fmt(total)}</td>
          </tr>
        </tbody>
      </table>

      {withholdingBase > 0 && (
        <div style={{ fontSize: 11, color: "#555", marginBottom: 16 }}>
          源泉徴収税　10.21%　{fmt(withholdingBase)}　{fmt(withholdingTax)}
        </div>
      )}

      <table style={{ width: "100%", borderCollapse: "collapse", border: "1px solid #d1d5db", marginBottom: 12 }}>
        <thead>
          <tr style={{ background: "#1f2937", color: "#fff" }}>
            <th colSpan={4} style={{ padding: "6px 10px", textAlign: "center", fontWeight: 700 }}>振込先</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td style={{ ...tdL, width: 90, color: "#555", background: "#f9fafb" }}>銀行名</td>
            <td style={tdL}>{f.bankName}</td>
            <td style={{ ...tdL, width: 90, color: "#555", background: "#f9fafb" }}>支店名</td>
            <td style={tdL}>{f.branchName}{f.branchCode ? `　支店番号 ${f.branchCode}` : ""}</td>
          </tr>
          <tr>
            <td style={{ ...tdL, color: "#555", background: "#f9fafb" }}>口座種別</td>
            <td style={tdL}>{f.accountType}口座</td>
            <td style={{ ...tdL, color: "#555", background: "#f9fafb" }}>口座番号</td>
            <td style={tdL}>{f.accountNo}</td>
          </tr>
          <tr>
            <td style={{ ...tdL, color: "#555", background: "#f9fafb" }}>口座名義</td>
            <td colSpan={3} style={tdL}>{f.accountHolder}</td>
          </tr>
        </tbody>
      </table>

      {f.notes && (
        <div style={{ padding: 10, border: "1px solid #e5e7eb", background: "#f9fafb", fontSize: 12, whiteSpace: "pre-wrap" }}>
          <b>備考</b>　{f.notes}
        </div>
      )}
    </div>
  );

  return (
    <div style={s.page}>
      <div style={{ maxWidth: 720, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
          <h1 style={{ margin: 0, fontSize: 17, fontWeight: 800, color: "#111" }}>請求書作成（アーティスト向け）</h1>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setPreview(true)} style={{ border: "1px solid #d1d5db", borderRadius: 3, padding: "6px 14px", cursor: "pointer", fontSize: 13 }}>プレビュー</button>
            <button onClick={handlePrint} style={{ background: "#1f2937", color: "#fff", border: "none", borderRadius: 3, padding: "6px 14px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>印刷 / PDF出力</button>
          </div>
        </div>

        <div style={s.card}>
          <div style={s.title}>請求書情報</div>
          <div style={s.grid3}>
            <F label="請求書番号（任意）">{inp(f.invoiceNo, v => upd("invoiceNo", v), "INV-001")}</F>
            <F label="発行日">{inp(f.date, v => upd("date", v), "", "date")}</F>
            <F label="支払期限">{inp(f.dueDate, v => upd("dueDate", v), "", "date")}</F>
          </div>
          <div style={{ marginTop: 12, ...s.grid2 }}>
            <F label="請求先（宛名）">{inp(f.toName, v => upd("toName", v), "合同会社〇〇")}</F>
            <F label="件名">{inp(f.subject, v => upd("subject", v), "〇月〇日 [イベント名] 出演費")}</F>
          </div>
        </div>

        <div style={s.card}>
          <div style={s.title}>発行者情報（アーティスト）</div>
          <div style={s.grid2}>
            <F label="本名（苗字 名前）">{inp(f.realName, v => upd("realName", v), "山田 太郎")}</F>
            <F label="アーティスト名">{inp(f.artistName, v => upd("artistName", v), "DJ Taro")}</F>
            <F label="住所">{inp(f.addr, v => upd("addr", v), "東京都〇〇区...")}</F>
            <F label="電話番号">{inp(f.tel, v => upd("tel", v), "090-0000-0000")}</F>
          </div>
          {f.realName && (
            <div style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 11, color: "#6b7280" }}>電子印鑑プレビュー：</span>
              <Hanko realName={f.realName} />
            </div>
          )}
        </div>

        <div style={s.card}>
          <div style={s.title}>品目明細</div>
          <div style={{ display: "grid", gridTemplateColumns: "3fr 1fr 1fr 1.5fr 80px auto", gap: 6, marginBottom: 6 }}>
            {["品目名", "数量", "単位", "単価（円）", "源泉対象", ""].map((h, i) => (
              <span key={i} style={{ fontSize: 11, fontWeight: 600, color: "#6b7280", textAlign: i === 4 ? "center" : "left" }}>{h}</span>
            ))}
          </div>
          {items.map(item => (
            <div key={item.id} style={{ display: "grid", gridTemplateColumns: "3fr 1fr 1fr 1.5fr 80px auto", gap: 6, marginBottom: 6, alignItems: "center" }}>
              <input style={s.inp} value={item.name} onChange={e => updItem(item.id, "name", e.target.value)} placeholder="品目を入力" />
              <input style={s.inp} type="number" value={item.qty} onChange={e => updItem(item.id, "qty", e.target.value)} />
              <input style={s.inp} value={item.unit} onChange={e => updItem(item.id, "unit", e.target.value)} placeholder="回" />
              <input style={s.inp} type="number" value={item.price} onChange={e => updItem(item.id, "price", e.target.value)} placeholder="0" />
              <div style={{ textAlign: "center" }}>
                <input type="checkbox" checked={item.withholding} onChange={e => updItem(item.id, "withholding", e.target.checked)} style={{ width: 16, height: 16, cursor: "pointer" }} />
              </div>
              <button onClick={() => delItem(item.id)} style={{ background: "#fff", border: "1px solid #d1d5db", borderRadius: 3, padding: "6px 9px", cursor: "pointer", color: "#9ca3af", fontSize: 13 }}>✕</button>
            </div>
          ))}
          <button onClick={addItem} style={{ marginTop: 6, width: "100%", padding: "8px", border: "1px dashed #d1d5db", borderRadius: 3, background: "#f9fafb", cursor: "pointer", fontSize: 13, color: "#374151" }}>
            ＋ 品目を追加
          </button>
          <div style={{ marginTop: 14, borderTop: "1px solid #e5e7eb", paddingTop: 12 }}>
            <table style={{ marginLeft: "auto", fontSize: 13, borderCollapse: "collapse", minWidth: 240 }}>
              <tbody>
                <tr><td style={{ padding: "3px 10px", color: "#6b7280" }}>小計</td><td style={{ textAlign: "right", padding: "3px 10px" }}>¥{fmt(subtotal)}</td></tr>
                {withholdingBase > 0 && <>
                  <tr><td style={{ padding: "3px 10px", color: "#6b7280" }}>源泉対象額</td><td style={{ textAlign: "right", padding: "3px 10px" }}>¥{fmt(withholdingBase)}</td></tr>
                  <tr><td style={{ padding: "3px 10px", color: "#e53e3e" }}>源泉徴収（10.21%）天引き</td><td style={{ textAlign: "right", padding: "3px 10px", color: "#e53e3e" }}>－¥{fmt(withholdingTax)}</td></tr>
                </>}
                <tr style={{ borderTop: "2px solid #1f2937", fontWeight: 800 }}>
                  <td style={{ padding: "6px 10px" }}>合計（振込額）</td>
                  <td style={{ textAlign: "right", padding: "6px 10px" }}>¥{fmt(total)}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div style={s.card}>
          <div style={s.title}>振込先</div>
          <div style={s.grid3}>
            <F label="銀行名">{inp(f.bankName, v => upd("bankName", v), "ゆうちょ銀行")}</F>
            <F label="支店名">{inp(f.branchName, v => upd("branchName", v), "〇〇支店")}</F>
            <F label="支店番号（3桁）">{inp(f.branchCode, v => upd("branchCode", v), "058")}</F>
            <F label="口座種別">
              <select value={f.accountType} onChange={e => upd("accountType", e.target.value)} style={s.inp}>
                <option>普通</option><option>当座</option><option>貯蓄</option>
              </select>
            </F>
            <F label="口座番号（7桁）">{inp(f.accountNo, v => upd("accountNo", v), "1234567")}</F>
            <F label="口座名義（カタカナ）">{inp(f.accountHolder, v => upd("accountHolder", v), "ヤマダ タロウ")}</F>
          </div>
        </div>

        <div style={s.card}>
          <div style={s.title}>備考</div>
          <textarea value={f.notes} onChange={e => upd("notes", e.target.value)}
            style={{ ...s.inp, resize: "vertical", minHeight: 60 }} placeholder="特記事項があれば..." />
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
